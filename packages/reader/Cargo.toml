[package]
name = "narratorlog-reader"
version = "0.1.0"
edition = "2021"
description = "Codebase context reader for narratorlog — extracts surrounding context from changed files via Unix socket"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio-util = { version = "0.7", features = ["codec"] }

[[bin]]
name = "narratorlog-reader"
path = "src/main.rs"
