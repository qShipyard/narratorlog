services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  web:
    image: ghcr.io/narratorlog/web:latest
    environment:
      - NEXT_PUBLIC_API_URL=${APP_URL}
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/narratorlog/api:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_SECRET=${APP_SECRET}
      - APP_URL=${APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITLAB_CLIENT_ID=${GITLAB_CLIENT_ID}
      - GITLAB_CLIENT_SECRET=${GITLAB_CLIENT_SECRET}
      - BITBUCKET_CLIENT_ID=${BITBUCKET_CLIENT_ID}
      - BITBUCKET_CLIENT_SECRET=${BITBUCKET_CLIENT_SECRET}
    volumes:
      - reader_socket:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reader:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ghcr.io/narratorlog/api:latest
    command: ["worker"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_SECRET=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reader:
        condition: service_started
    restart: unless-stopped

  reader:
    image: ghcr.io/narratorlog/reader:latest
    environment:
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=narratorlog
      - POSTGRES_USER=${POSTGRES_USER:-narratorlog}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narratorlog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  reader_socket: