version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

  web:
    image: ghcr.io/narratorlog/web:latest
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
    depends_on:
      - api

  api:
    image: ghcr.io/narratorlog/api:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_SECRET=${APP_SECRET}
      - APP_URL=${APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITLAB_CLIENT_ID=${GITLAB_CLIENT_ID}
      - GITLAB_CLIENT_SECRET=${GITLAB_CLIENT_SECRET}
    volumes:
      - reader_socket:/tmp
    depends_on:
      - postgres
      - redis
      - reader

  worker:
    image: ghcr.io/narratorlog/api:latest
    command: ["worker"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_SECRET=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    depends_on:
      - postgres
      - redis
      - reader

  reader:
    image: ghcr.io/narratorlog/reader:latest
    environment:
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=narratorlog
      - POSTGRES_USER=${POSTGRES_USER:-narratorlog}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narratorlog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  reader_socket:
