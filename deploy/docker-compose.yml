services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  web:
    image: ghcr.io/qshipyard/narratorlog-web:latest
    environment:
      - NEXT_PUBLIC_API_URL=${APP_URL}
      - API_INTERNAL_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/qshipyard/narratorlog-api:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_SECRET=${APP_SECRET}
      - APP_URL=${APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reader:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ghcr.io/qshipyard/narratorlog-api:latest
    entrypoint: ["./narratorlog-worker"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_URL=${APP_URL}
      - APP_SECRET=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reader:
        condition: service_started
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["tools"]
    volumes:
      - ../apps/api/internal/db/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  reader:
    image: ghcr.io/qshipyard/narratorlog-reader:latest
    environment:
      - READER_SOCKET=/tmp/reader.sock
    volumes:
      - reader_socket:/tmp
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=narratorlog
      - POSTGRES_USER=${POSTGRES_USER:-narratorlog}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narratorlog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  reader_socket: