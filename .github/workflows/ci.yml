name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Detect which language trees changed so each job runs only when relevant.
  # Skipped jobs report success, so they never block an unrelated PR.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'apps/api/**'
            rust:
              - 'packages/reader/**'
            typescript:
              - 'apps/web/**'
              - 'packages/sdk/**'
              - 'plugins/**'

  go:
    name: Go
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: cd apps/api && go test ./...
      - name: Vet
        run: cd apps/api && go vet ./...

  rust:
    name: Rust
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cd packages/reader && cargo test
      - name: Clippy
        run: cd packages/reader && cargo clippy -- -D warnings

  # Disabled until the JS workspace is bootstrapped (root package.json, turbo,
  # tsconfig, pnpm-lock.yaml). Re-enable once those exist.
